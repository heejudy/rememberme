apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deploy
  namespace: default
  labels:
    app: backend
spec:
  replicas: 1
  revisionHistoryLimit: 3  
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: dndzhr/backend:6.0
        ports:
          - containerPort: 8085
        envFrom:
          - configMapRef:
              name: backend-config
          - secretRef:
              name: rememberme-backend-secret
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness # 경로 세분화 권장
            port: 8085
          initialDelaySeconds: 20 # 조금 더 빠르게 투입하도록 수정
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        # Liveness: 앱이 살아있는지 확인 (죽었으면 재시작)
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness # 경로 세분화 권장
            port: 8085
          initialDelaySeconds: 60 # Readiness보다 조금 뒤에 시작
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"