apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-app
  namespace: argocd 
spec:
  project: default

  source:
    repoURL: git@github.com:heejudy/rememberme.git
    targetRevision: main 
    path: k8s/frontend

  destination:
    server: https://kubernetes.default.svc
    namespace: default 

  syncPolicy:
    automated:
      prune: true
      selfHeal: true