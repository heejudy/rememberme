apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: rememberme
  labels:
    app: frontend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: dndzhr/frontend:4.0
          ports:
            - containerPort: 85
              protocol: TCP